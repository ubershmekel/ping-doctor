<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PingDoctor Options</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
      .target-row { border: 1px solid var(--pico-muted-border-color); border-radius: 8px; padding: 0.9rem; margin-bottom: 0.8rem; }
      .target-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.5rem; }
      .target-head strong { font-size: 0.95rem; }
      .target-enabled { display: flex; align-items: center; gap: 0.5rem; }
    </style>
  </head>
  <body>
    <main class="container">
      <h2>PingDoctor Settings</h2>
      <p>Targets are fully user-defined. Add or remove as many as you want.</p>

      <details>
        <summary>How to find your router IP</summary>
        <p><strong>Windows:</strong> Run <code>ipconfig</code> and use the <em>Default Gateway</em> value.</p>
        <p><strong>macOS:</strong> Run <code>route -n get default</code> and use <em>gateway</em>.</p>
        <p><strong>Linux:</strong> Run <code>ip route</code> and use the address after <em>default via</em>.</p>
      </details>

      <form id="settings-form">
        <label>
          Poll Interval
          <select id="poll-interval" name="pollIntervalSec">
            <option value="15">15 seconds</option>
            <option value="30">30 seconds</option>
            <option value="60">60 seconds</option>
          </select>
        </label>

        <h4>Ping Targets</h4>
        <div id="targets-list"></div>
        <button id="add-target" type="button" class="secondary">Add Target</button>

        <hr />
        <button type="submit">Save</button>
      </form>

      <hr />
      <button id="export-data" class="secondary" type="button">Export data as JSON</button>
      <button id="clear-data" class="contrast" type="button">Clear all data</button>
      <p id="status"></p>
    </main>

    <template id="target-template">
      <article class="target-row" data-target-row>
        <div class="target-head">
          <strong data-target-title>Target</strong>
          <button type="button" data-action="remove" class="contrast">Delete</button>
        </div>
        <label class="target-enabled">
          <input data-field="enabled" type="checkbox" />
          Enabled
        </label>
        <label>
          Label
          <input data-field="label" type="text" placeholder="Target Label" />
        </label>
        <label>
          Address or URL
          <input data-field="address" type="text" placeholder="8.8.8.8" />
        </label>
        <input data-field="id" type="hidden" />
      </article>
    </template>

    <script type="module" src="./options.ts"></script>
  </body>
</html>
