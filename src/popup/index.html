<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PingDoctor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css" />
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        width: 420px;
        margin: 0;
        padding: 0.75rem;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.5rem;
      }
      h4 {
        margin-bottom: 0.45rem;
      }
      ul {
        margin: 0;
        padding-left: 1.1rem;
      }
      li {
        margin-bottom: 0.35rem;
      }
      .dim {
        opacity: 0.75;
        font-size: 0.85rem;
      }
      .result-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.4rem;
        align-items: baseline;
      }
      .result-values {
        font-size: 0.85rem;
        text-align: right;
      }
      .down-state {
        color: #7f1d1d;
        font-weight: 600;
      }
      .latency-warn {
        color: #d69e2e;
        font-weight: 600;
      }
    </style>
  </head>
  <body>
    <header>
      <strong>PingDoctor</strong>
      <button id="open-options" type="button" class="secondary">Open Details</button>
    </header>
    <p class="dim" id="last-check">Last checkup: never</p>

    <section>
      <h4>Addresses</h4>
      <ul id="addresses"></ul>
    </section>

    <section>
      <h4>Recent Results</h4>
      <div id="recent-results"></div>
    </section>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
